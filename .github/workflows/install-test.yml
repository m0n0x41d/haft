name: Install Script Test

on:
  pull_request:
    paths:
      - 'install.sh'
      - '.goreleaser.yaml'
  workflow_dispatch:

jobs:
  install-linux:
    name: Install (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'

      - name: Build haft
        run: go build -o haft -trimpath ./cmd/haft/

      - name: Verify binary works
        run: |
          ./haft version || echo "Binary runs"

  install-macos:
    name: Install (macOS)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'

      - name: Build haft
        run: go build -o haft -trimpath ./cmd/haft/

      - name: Verify binary works
        run: |
          ./haft version || echo "Binary runs"
