name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  test:
    name: Pre-release tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          cache-dependency-path: go.sum

      - name: Prepare desktop embed placeholder
        run: |
          mkdir -p desktop/frontend/dist
          printf 'ci placeholder\n' > desktop/frontend/dist/.ci-placeholder

      - name: Run tests
        run: |
          packages=$(go list ./... | grep -v /desktop)

          while IFS= read -r pkg; do
            echo "::group::go test -race $pkg"
            go test -v -race "$pkg"
            echo "::endgroup::"
          done <<EOF
          $packages
          EOF

  release:
    name: Release
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          cache-dependency-path: go.sum

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: |
            desktop/frontend/package-lock.json
            tui/package-lock.json

      - uses: goreleaser/goreleaser-action@v6
        with:
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
