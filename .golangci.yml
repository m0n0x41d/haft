version: "2"

run:
  timeout: 5m
  tests: false

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - misspell
    - unconvert
    - gosec
    - bodyclose
    - gocritic
    - nolintlint
  settings:
    misspell:
      locale: US
    gocritic:
      disabled-checks:
        - ifElseChain
        - singleCaseSwitch
        - elseif
    nolintlint:
      require-explanation: true
      require-specific: true
    gosec:
      excludes:
        - G301 # directory permissions 0755 — fine for user-facing dirs
        - G302 # file permissions 0644 — fine for user-facing files
        - G204 # subprocess with variable — we call claude/git as subprocess intentionally
        - G304 # file inclusion via variable — we read user-specified paths intentionally
        - G306 # WriteFile permissions 0644 — fine for markdown/config files
        - G703 # path traversal — we construct paths from project root intentionally
  exclusions:
    paths:
      - desktop/
    rules:
      - linters:
          - errcheck
        source: "Send[A-Z][A-Za-z]+\\("
      - linters:
          - errcheck
        source: "os\\.Stderr\\.WriteString\\("
      - linters:
          - errcheck
        source: "syscall\\.Syscall6?\\("
      - linters:
          - staticcheck
        text: "QF1003"
      - linters:
          - staticcheck
        text: "QF1012"
      - linters:
          - errcheck
        source: "defer .*(Close|Rollback)\\(\\)"
      - path: internal/provider/openai.go
        linters:
          - gosec
        text: "G117:"
      - path: internal/cli/login.go
        linters:
          - gosec
        text: "G117:"
      - path: internal/cli/term_echo_linux.go
        linters:
          - gosec
        text: "G115:"

formatters:
  enable:
    - gofmt
    - goimports
