version: 2

project_name: haft

before:
  hooks:
    - sh -c "cd desktop/frontend && npm ci && npm run build"
    - sh -c "cd tui && npm ci && npm run build"

builds:
  - id: haft
    dir: .
    main: ./cmd/haft/
    binary: haft
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X github.com/m0n0x41d/haft/internal/cli.Version={{ .Version }}
      - -X github.com/m0n0x41d/haft/internal/cli.Commit={{ .ShortCommit }}
      - -X github.com/m0n0x41d/haft/internal/cli.BuildDate={{ .Date }}
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
  - id: haft-desktop
    dir: .
    main: ./desktop
    binary: haft-desktop
    flags:
      - -trimpath
    goos:
      - darwin
    goarch:
      - amd64
      - arm64

archives:
  - id: haft-cli
    ids:
      - haft
    formats:
      - tar.gz
    name_template: "{{ .ProjectName }}-cli-{{ .Os }}-{{ .Arch }}"
    files:
      - README*
      - LICENSE*
      - CHANGELOG*
      - src: tui/dist/tui.mjs
        dst: tui
        strip_parent: true
  - id: haft-desktop
    ids:
      - haft-desktop
    formats:
      - zip
    name_template: "{{ .ProjectName }}-desktop-{{ .Os }}-{{ .Arch }}"

checksum:
  name_template: 'checksums.txt'

changelog:
  use: github-native

release:
  header: |
    ## Haft {{ .Tag }}

    Engineering agent with FPF reasoning discipline. Interactive CLI + MCP server.

    ### Install

    ```bash
    go install github.com/m0n0x41d/haft/cmd/haft@latest
    ```

    ### Desktop Artifact

    Release archives now include a `haft-desktop` build for macOS alongside the CLI bundles.

    See [CHANGELOG](https://github.com/m0n0x41d/quint-code/blob/main/CHANGELOG.md) for full details.
