version: 2

project_name: haft

builds:
  - id: haft
    dir: .
    main: ./cmd/haft/
    binary: haft
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X github.com/m0n0x41d/haft/internal/cli.Version={{ .Version }}
      - -X github.com/m0n0x41d/haft/internal/cli.Commit={{ .ShortCommit }}
      - -X github.com/m0n0x41d/haft/internal/cli.BuildDate={{ .Date }}
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64

archives:
  - id: default
    formats:
      - tar.gz
    name_template: "{{ .ProjectName }}-{{ .Os }}-{{ .Arch }}"

checksum:
  name_template: 'checksums.txt'

changelog:
  use: github-native

release:
  header: |
    ## Haft {{ .Tag }}

    Engineering agent with FPF reasoning discipline. Interactive CLI + MCP server.

    ### Install

    ```bash
    go install github.com/m0n0x41d/haft/cmd/haft@latest
    ```

    See [CHANGELOG](https://github.com/m0n0x41d/quint-code/blob/main/CHANGELOG.md) for full details.
