version: 2

project_name: quint-code

builds:
  - id: quint-code
    dir: src/mcp
    main: .
    binary: quint-code
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X github.com/m0n0x41d/quint-code/cmd.Version={{ .Version }}
      - -X github.com/m0n0x41d/quint-code/cmd.Commit={{ .ShortCommit }}
      - -X github.com/m0n0x41d/quint-code/cmd.BuildDate={{ .Date }}
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64

archives:
  - id: default
    formats:
      - tar.gz
    name_template: "{{ .ProjectName }}-{{ .Os }}-{{ .Arch }}"

checksum:
  name_template: 'checksums.txt'

changelog:
  use: github-native

release:
  header: |
    ## Quint Code {{ .Tag }}

    FPF-native engineering decision tool. 6 MCP tools. Works with Claude Code, Cursor, Gemini CLI, Codex CLI.

    ### Install

    ```bash
    curl -fsSL https://raw.githubusercontent.com/m0n0x41d/quint-code/main/install.sh | bash
    ```

    See [CHANGELOG](https://github.com/m0n0x41d/quint-code/blob/main/CHANGELOG.md) for full details.
