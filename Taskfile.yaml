version: '3'

vars:
  BIN_NAME: haft
  BIN_DIR: ~/.local/bin

tasks:
  default:
    desc: Show available tasks
    cmds:
      - task --list

  test:
    desc: Run all tests
    cmds:
      - go test -v ./...

  lint:
    desc: Run linter (go vet)
    cmds:
      - go vet ./...

  build:
    desc: Build binary
    cmds:
      - go build -o {{.BIN_NAME}} -trimpath ./cmd/haft/
    generates:
      - '{{.BIN_NAME}}'

  install:
    desc: Build and install to ~/.local/bin
    cmds:
      - go build -o {{.BIN_DIR}}/{{.BIN_NAME}} -trimpath ./cmd/haft/
      - echo "Installed to {{.BIN_DIR}}/{{.BIN_NAME}}"

  clean:
    desc: Remove local build binary
    cmds:
      - rm -f {{.BIN_NAME}}

  cleanup:
    desc: Remove all built binaries (local + installed)
    cmds:
      - rm -f {{.BIN_NAME}}
      - rm -f {{.BIN_DIR}}/{{.BIN_NAME}}
      - echo "Cleaned up"
