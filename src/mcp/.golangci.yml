version: "2"

run:
  timeout: 5m
  tests: false

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - misspell
    - unconvert
    - gosec
    - bodyclose
    - gocritic
    - prealloc
    - nolintlint
  settings:
    misspell:
      locale: US
    gocritic:
      disabled-checks:
        - ifElseChain
        - singleCaseSwitch
    nolintlint:
      require-explanation: true
      require-specific: true
  exclusions:
    rules:
      - linters:
          - staticcheck
        text: "QF1003"
      - linters:
          - errcheck
        source: "defer .*(Close|Rollback)\\(\\)"
      - linters:
          - gosec
        text: "G204" # subprocess launched with variable — we use bash intentionally
      - linters:
          - gocritic
        text: "appendAssign"

formatters:
  enable:
    - gofmt
    - goimports
