version: "2"

run:
  timeout: 5m
  tests: false

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - misspell
    - unconvert
    - gosec
    - bodyclose
    - gocritic
    - nolintlint
  settings:
    misspell:
      locale: US
    gocritic:
      disabled-checks:
        - ifElseChain
        - singleCaseSwitch
        - elseif
    nolintlint:
      require-explanation: true
      require-specific: true
    gosec:
      excludes:
        - G301 # directory permissions 0755 — fine for user-facing dirs
        - G302 # file permissions 0644 — fine for user-facing files
        - G304 # file inclusion via variable — we read user-specified paths intentionally
        - G306 # WriteFile permissions 0644 — fine for markdown/config files
  exclusions:
    rules:
      - linters:
          - staticcheck
        text: "QF1003"
      - linters:
          - errcheck
        source: "defer .*(Close|Rollback)\\(\\)"

formatters:
  enable:
    - gofmt
    - goimports
